# Local infrastructure for the blitzy-slack proof-of-concept.
#
# Brought up by `make up` / `make local`, which run `docker compose up -d --wait`
# and block until both services report healthy. The API and web packages run on
# the host; only the stateful backing services (PostgreSQL, Redis) run here.
#
# Defaults below match the values in `.env.example` (slack / slack / slack_dev);
# every value can be overridden via a root `.env`, which the Makefile loads and
# exports. Credentials here are LOCAL-DEVELOPMENT ONLY and are not real secrets.
#
# Rationale for these choices is recorded in /docs/decision-log.md.

services:
  # PostgreSQL 16 — primary relational store. Initialised as UTF-8 with C
  # collation (see POSTGRES_INITDB_ARGS below).
  postgres:
    image: postgres:16-alpine
    container_name: blitzy-slack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slack}
      POSTGRES_DB: ${POSTGRES_DB:-slack_dev}
      # Applied only on first initialisation of an empty data volume.
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-slack} -d ${POSTGRES_DB:-slack_dev}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Redis 7 — Socket.io pub/sub adapter (Rule 2) and presence TTL cache.
  # Started with AOF persistence (`--appendonly yes`).
  redis:
    image: redis:7-alpine
    container_name: blitzy-slack-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

# Named volumes survive `make down` / `make clean` (neither passes `-v`).
# Remove them explicitly with `docker compose down -v`.
volumes:
  postgres_data:
    name: blitzy-slack-postgres-data
    driver: local
  redis_data:
    name: blitzy-slack-redis-data
    driver: local
